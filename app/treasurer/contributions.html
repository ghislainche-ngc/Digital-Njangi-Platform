<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Contributions — NjangiBridge</title>
    <link rel="stylesheet" href="/src/css/app.css" />
    <script type="module" src="/src/js/boot.js"></script>
  </head>
  <body x-data x-init="$store.theme.init()" x-cloak class="relative">
    <div id="app-shell"></div>
    <script type="module">
      import { renderShell, mountContent } from '/src/js/components/app-shell.js';
      renderShell({ role: 'treasurer', title: 'Contributions' });
      const rows = [
        ['Marie Tchinda',      'MTN MoMo',     '10 000', 'Apr 14', 'paid',   'Paid',   ''],
        ['Jean-Pierre Mbarga', 'MTN MoMo',     '10 000', 'Apr 14', 'paid',   'Paid',   ''],
        ['Claire Biya',        'Orange Money', '10 000', 'Apr 14', 'paid',   'Paid',   ''],
        ['Fatou Ngo',          'Orange Money', '10 000', 'Apr 14', 'paid',   'Paid',   ''],
        ['Pa Ngwa',            'Cash',         '10 000', '—',      'due',    'Pending','Record'],
        ['Alice Fotso',        'MTN MoMo',     '10 000', 'Apr 14', 'failed', 'Failed', 'Retry'],
      ].map(r => {
        const action = r[6] ? `<button class="nav-link text-xs">${r[6]}</button>` : '<span class="muted text-xs">—</span>';
        return `
          <tr>
            <td class="px-5 py-3 font-medium">${r[0]}</td>
            <td>${r[1]}</td>
            <td class="font-mono">${r[2]}</td>
            <td>${r[3]}</td>
            <td><span class="chip chip-${r[4]}">${r[5]}</span></td>
            <td class="text-right pr-5">${action}</td>
          </tr>
        `;
      }).join('');
      mountContent(`
        <div class="grid gap-4 md:grid-cols-3 mb-6">
          <div class="glass-card p-5"><p class="text-xs uppercase tracking-widest muted">Collected</p><p class="mt-2 font-display text-3xl font-bold">110 000</p><p class="mt-1 text-xs text-emerald-500">11 of 14 members</p></div>
          <div class="glass-card p-5"><p class="text-xs uppercase tracking-widest muted">Due</p><p class="mt-2 font-display text-3xl font-bold">30 000</p><p class="mt-1 text-xs text-amber-500">3 members pending</p></div>
          <div class="glass-card p-5"><p class="text-xs uppercase tracking-widest muted">Failed</p><p class="mt-2 font-display text-3xl font-bold">1</p><p class="mt-1 text-xs text-red-500">Auto-retry in 4h</p></div>
        </div>

        <div class="glass-card p-5 mb-6 flex flex-wrap items-center gap-3">
          <select class="glass-input w-auto">
            <option>Cycle 4 · April</option><option>Cycle 3 · March</option>
          </select>
          <select class="glass-input w-auto">
            <option>All statuses</option><option>Paid</option><option>Due</option><option>Failed</option>
          </select>
          <div class="flex-1"></div>
          <button class="btn-ghost">↻ Retry all failed</button>
          <button class="btn-primary">+ Record cash payment</button>
        </div>

        <div class="glass-card p-0 overflow-hidden">
          <table class="w-full text-sm">
            <thead class="text-left muted uppercase text-xs bg-[var(--bg-muted)]">
              <tr>
                <th class="px-5 py-3">Member</th>
                <th>Method</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Status</th>
                <th class="text-right pr-5">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-[var(--border-subtle)]">${rows}</tbody>
          </table>
        </div>

        <p class="mt-4 text-xs muted">PR-13 auto MoMo debit · PR-16 automatic retry · PR-18 manual cash record · PR-20 Orange Money alt.</p>
      `);
    </script>
  </body>
</html>
