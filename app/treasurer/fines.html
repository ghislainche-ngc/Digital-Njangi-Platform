<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Fines — NjangiBridge</title>
    <link rel="stylesheet" href="/src/css/app.css" />
    <script type="module" src="/src/js/boot.js"></script>
  </head>
  <body x-data x-init="$store.theme.init()" x-cloak class="relative">
    <div id="app-shell"></div>
    <script type="module">
      import { renderShell, mountContent } from '/src/js/components/app-shell.js';
      renderShell({ role: 'treasurer', title: 'Fines' });
      const rows = [
        ['Pa Ngwa',     'Late contribution',    '2 000', 'Apr 15', 'due',  'Unpaid',     'Mark paid'],
        ['Alice Fotso', 'Missed meeting',       '3 000', 'Apr 10', 'due',  'Unpaid',     'Mark paid'],
        ['Marie T.',    'Absent without notice','2 000', 'Mar 20', 'paid', 'Paid',       ''],
        ['Jean-Pierre', 'Late contribution',    '2 000', 'Feb 18', 'info', 'Waived',     ''],
      ].map(r => {
        const actions = r[6]
          ? `<button class="nav-link text-xs">${r[6]}</button> <button class="nav-link text-xs text-amber-500">Waive</button>`
          : '<span class="muted text-xs">—</span>';
        return `
          <tr>
            <td class="px-5 py-3 font-medium">${r[0]}</td>
            <td>${r[1]}</td>
            <td class="font-mono">${r[2]}</td>
            <td>${r[3]}</td>
            <td><span class="chip chip-${r[4]}">${r[5]}</span></td>
            <td class="text-right pr-5">${actions}</td>
          </tr>
        `;
      }).join('');
      mountContent(`
        <div class="grid gap-4 md:grid-cols-3 mb-6">
          <div class="glass-card p-5"><p class="text-xs uppercase tracking-widest muted">Outstanding</p><p class="mt-2 font-display text-3xl font-bold">8 000</p><p class="mt-1 text-xs text-amber-500">2 unpaid fines</p></div>
          <div class="glass-card p-5"><p class="text-xs uppercase tracking-widest muted">Collected YTD</p><p class="mt-2 font-display text-3xl font-bold">24 000</p></div>
          <div class="glass-card p-5"><p class="text-xs uppercase tracking-widest muted">Waivers</p><p class="mt-2 font-display text-3xl font-bold">1</p><p class="mt-1 text-xs muted">Logged with reason</p></div>
        </div>

        <div class="glass-card p-5 mb-6 flex justify-end">
          <button class="btn-primary">+ Issue fine</button>
        </div>

        <div class="glass-card p-0 overflow-hidden">
          <table class="w-full text-sm">
            <thead class="text-left muted uppercase text-xs bg-[var(--bg-muted)]">
              <tr>
                <th class="px-5 py-3">Member</th>
                <th>Reason</th>
                <th>Amount</th>
                <th>Issued</th>
                <th>Status</th>
                <th class="text-right pr-5">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-[var(--border-subtle)]">${rows}</tbody>
          </table>
        </div>

        <p class="mt-4 text-xs muted">PR-36 record fine · PR-37 mark paid · PR-38 waiver logged immutably with reason.</p>
      `);
    </script>
  </body>
</html>
