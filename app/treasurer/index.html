<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Treasurer — NjangiBridge</title>
    <link rel="stylesheet" href="/src/css/app.css" />
    <script type="module" src="/src/js/boot.js"></script>
  </head>
  <body x-data x-init="$store.theme.init()" x-cloak class="relative">
    <div id="app-shell"></div>
    <script type="module">
      import { renderShell, mountContent } from '/src/js/components/app-shell.js';
      renderShell({ role: 'treasurer', title: 'Financial overview' });
      mountContent(`
        <div class="glass-card p-4 mb-4 flex flex-wrap items-center gap-3 animate-fade-up">
          <span class="chip chip-info">You</span>
          <p class="text-sm"><span class="muted">Your cycle 4 contribution:</span> <span class="font-semibold">Paid · MTN MoMo · Apr 14</span></p>
          <span class="text-sm muted hidden sm:inline">·</span>
          <p class="text-sm"><span class="muted">Your rotation position:</span> <span class="font-semibold">3 · May 28</span></p>
          <a href="/app/member/history.html" class="ml-auto nav-link text-xs">My Njangi →</a>
        </div>

        <div class="grid gap-4 md:grid-cols-3 animate-fade-up">
          <div class="glass-card p-5">
            <p class="text-xs uppercase tracking-widest muted">Collected this cycle</p>
            <p class="mt-2 font-display text-3xl font-bold">110 000 FCFA</p>
            <p class="mt-1 text-xs text-emerald-500">11 of 14 members</p>
          </div>
          <div class="glass-card p-5">
            <p class="text-xs uppercase tracking-widest muted">Outstanding</p>
            <p class="mt-2 font-display text-3xl font-bold">30 000 FCFA</p>
            <p class="mt-1 text-xs text-amber-500">3 members due</p>
          </div>
          <div class="glass-card p-5">
            <p class="text-xs uppercase tracking-widest muted">Social fund</p>
            <p class="mt-2 font-display text-3xl font-bold">85 000 FCFA</p>
            <p class="mt-1 text-xs muted">Available</p>
          </div>
        </div>

        <div class="mt-6 glass-card p-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-display text-xl font-bold">Pending actions</h2>
          </div>
          <div class="grid gap-3 md:grid-cols-3">
            <button class="glass-card p-4 text-left hover:ring-2 hover:ring-[var(--accent)] transition">
              <span class="chip chip-due mb-2">3 due</span>
              <p class="font-semibold">Retry failed MoMo</p>
              <p class="text-xs muted mt-1">3 members have temporary MoMo failures.</p>
            </button>
            <button class="glass-card p-4 text-left hover:ring-2 hover:ring-[var(--accent)] transition">
              <span class="chip chip-info mb-2">1 new</span>
              <p class="font-semibold">Record cash payment</p>
              <p class="text-xs muted mt-1">Pa Ngwa paid cash at last meeting.</p>
            </button>
            <button class="glass-card p-4 text-left hover:ring-2 hover:ring-[var(--accent)] transition">
              <span class="chip chip-paid mb-2">ready</span>
              <p class="font-semibold">Trigger payout</p>
              <p class="text-xs muted mt-1">Marie T. · awaiting approval.</p>
            </button>
          </div>
        </div>
      `);
    </script>
  </body>
</html>
