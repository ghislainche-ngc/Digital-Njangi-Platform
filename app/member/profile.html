<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Profile — NjangiBridge</title>
    <link rel="stylesheet" href="/src/css/app.css" />
    <script type="module" src="/src/js/boot.js"></script>
  </head>
  <body x-data x-init="$store.theme.init()" x-cloak class="relative">
    <div id="app-shell"></div>
    <script type="module">
      import { renderShell, mountContent } from '/src/js/components/app-shell.js';
      renderShell({ role: 'member', title: 'My profile' });
      mountContent(`
        <div class="grid gap-6 lg:grid-cols-2">
          <section class="glass-card p-6">
            <h2 class="font-display text-xl font-bold mb-4">Personal info</h2>
            <div class="flex items-center gap-4 mb-5">
              <div class="h-16 w-16 rounded-full accent-bg text-[var(--text-on-brand)] grid place-items-center text-xl font-bold">FN</div>
              <button class="btn-ghost text-sm">Change photo</button>
            </div>
            <div class="space-y-4">
              <div>
                <label class="text-xs font-semibold uppercase tracking-wider muted">Full name</label>
                <input class="glass-input mt-1" value="Fatou Ngo" />
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="text-xs font-semibold uppercase tracking-wider muted">Email</label>
                  <input class="glass-input mt-1" type="email" value="fatou@example.cm" />
                </div>
                <div>
                  <label class="text-xs font-semibold uppercase tracking-wider muted">Phone</label>
                  <input class="glass-input mt-1" type="tel" value="+237 6XX XXX 004" />
                </div>
              </div>
            </div>
          </section>

          <section class="glass-card p-6">
            <h2 class="font-display text-xl font-bold mb-4">Wallets</h2>
            <div class="space-y-3">
              <div class="p-4 rounded-xl border border-subtle flex items-center gap-3">
                <div class="h-10 w-10 rounded-lg bg-yellow-400 text-black grid place-items-center font-bold text-xs">MTN</div>
                <div class="flex-1">
                  <p class="font-semibold">MTN Mobile Money</p>
                  <p class="text-xs muted font-mono">+237 6XX XXX 004 · verified</p>
                </div>
                <span class="chip chip-paid">Primary</span>
              </div>
              <div class="p-4 rounded-xl border border-subtle flex items-center gap-3">
                <div class="h-10 w-10 rounded-lg bg-orange-500 text-white grid place-items-center font-bold text-xs">OM</div>
                <div class="flex-1">
                  <p class="font-semibold">Orange Money</p>
                  <p class="text-xs muted">Not linked</p>
                </div>
                <button class="nav-link text-xs">Link</button>
              </div>
            </div>
            <p class="mt-4 text-xs muted">PR-20: Orange Money as alternative payment channel.</p>
          </section>

          <section class="glass-card p-6">
            <h2 class="font-display text-xl font-bold mb-4">Notifications</h2>
            <div class="space-y-4">
              <label class="flex items-center justify-between">
                <div>
                  <p class="font-medium text-sm">Telegram</p>
                  <p class="text-xs muted">Primary channel for reminders + confirmations</p>
                </div>
                <input type="checkbox" checked class="h-4 w-4 accent-[var(--accent)]" />
              </label>
              <label class="flex items-center justify-between">
                <div>
                  <p class="font-medium text-sm">SMS</p>
                  <p class="text-xs muted">Fallback when offline</p>
                </div>
                <input type="checkbox" checked class="h-4 w-4 accent-[var(--accent)]" />
              </label>
              <label class="flex items-center justify-between">
                <div>
                  <p class="font-medium text-sm">Email receipts</p>
                  <p class="text-xs muted">PDF copies emailed monthly</p>
                </div>
                <input type="checkbox" class="h-4 w-4 accent-[var(--accent)]" />
              </label>
            </div>
            <div class="mt-5 p-3 rounded-xl bg-[var(--bg-muted)] text-xs">
              <p class="font-semibold">Telegram bot</p>
              <p class="muted mt-1">Tap below to link your Telegram account to NjangiBridge.</p>
              <button class="btn-ghost text-xs mt-3">Open @NjangiBridgeBot</button>
            </div>
          </section>

          <section class="glass-card p-6">
            <h2 class="font-display text-xl font-bold mb-4">Security</h2>
            <div class="space-y-4">
              <button class="btn-ghost w-full text-left">Change password →</button>
              <button class="btn-ghost w-full text-left">Enable SMS OTP (2FA) →</button>
              <button class="btn-ghost w-full text-left">View login history →</button>
            </div>
            <p class="mt-6 text-xs text-red-500">
              <a href="/login.html" onclick="localStorage.clear();">Sign out of NjangiBridge →</a>
            </p>
          </section>
        </div>

        <div class="mt-6 flex justify-end gap-3">
          <button class="btn-ghost">Cancel</button>
          <button class="btn-primary">Save profile</button>
        </div>
      `);
    </script>
  </body>
</html>
