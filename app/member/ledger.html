<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Group ledger — NjangiBridge</title>
    <link rel="stylesheet" href="/src/css/app.css" />
    <script type="module" src="/src/js/boot.js"></script>
  </head>
  <body x-data x-init="$store.theme.init()" x-cloak class="relative">
    <div id="app-shell"></div>
    <script type="module">
      import { renderShell, mountContent } from '/src/js/components/app-shell.js';
      renderShell({ role: 'member', title: 'Group ledger' });
      const rows = [
        ['Apr 14', 'Contribution', 'Marie Tchinda',      'MTN MoMo',     '+10 000', 'paid', 'Paid'],
        ['Apr 14', 'Contribution', 'Jean-Pierre Mbarga', 'MTN MoMo',     '+10 000', 'paid', 'Paid'],
        ['Apr 14', 'Contribution', 'Claire Biya',        'Orange Money', '+10 000', 'paid', 'Paid'],
        ['Apr 14', 'Contribution', 'Fatou Ngo',          'Orange Money', '+10 000', 'paid', 'Paid'],
        ['Apr 14', 'Contribution', 'Alice Fotso',        'MTN MoMo',     '—',       'failed', 'Failed'],
        ['Mar 28', 'Payout',       'Jean-Pierre Mbarga', 'MTN MoMo',     '−140 000','info', 'Sent'],
        ['Mar 15', 'Fine',         'Pa Ngwa',            '—',            '+2 000',  'due',  'Unpaid'],
        ['Mar 14', 'Contribution', 'Pa Ngwa',            'Cash',         '+10 000', 'paid', 'Paid'],
        ['Mar 14', 'Social fund',  '14 members',         '—',            '+14 000', 'paid', 'Deposited'],
      ].map(r => `
        <tr>
          <td class="px-5 py-3">${r[0]}</td>
          <td>${r[1]}</td>
          <td class="font-medium">${r[2]}</td>
          <td>${r[3]}</td>
          <td class="font-mono">${r[4]}</td>
          <td class="text-right pr-5"><span class="chip chip-${r[5]}">${r[6]}</span></td>
        </tr>
      `).join('');
      mountContent(`
        <div class="glass-card p-5 mb-6 flex items-center justify-between flex-wrap gap-3">
          <div class="flex items-center gap-3">
            <span class="chip chip-info">Immutable</span>
            <p class="text-xs muted">Every event below is permanent. Corrections are added as new entries.</p>
          </div>
          <select class="glass-input w-auto">
            <option>Cycle 4 · April</option>
            <option>Cycle 3 · March</option>
            <option>All cycles</option>
          </select>
        </div>

        <div class="grid gap-4 md:grid-cols-4 mb-6">
          <div class="glass-card p-5"><p class="text-xs muted uppercase">Pot</p><p class="mt-1 font-display text-2xl font-bold">450 000</p></div>
          <div class="glass-card p-5"><p class="text-xs muted uppercase">Collected</p><p class="mt-1 font-display text-2xl font-bold">110 000</p></div>
          <div class="glass-card p-5"><p class="text-xs muted uppercase">Paid out</p><p class="mt-1 font-display text-2xl font-bold">140 000</p></div>
          <div class="glass-card p-5"><p class="text-xs muted uppercase">Social fund</p><p class="mt-1 font-display text-2xl font-bold">85 000</p></div>
        </div>

        <div class="glass-card p-0 overflow-hidden">
          <table class="w-full text-sm">
            <thead class="text-left muted uppercase text-xs bg-[var(--bg-muted)]">
              <tr>
                <th class="px-5 py-3">Date</th>
                <th>Type</th>
                <th>Member</th>
                <th>Method</th>
                <th>Amount (FCFA)</th>
                <th class="text-right pr-5">Status</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-[var(--border-subtle)]">${rows}</tbody>
          </table>
        </div>

        <p class="mt-4 text-xs muted">PR-31 full group ledger · PR-32 payout history · PR-34 immutable.</p>
      `);
    </script>
  </body>
</html>
