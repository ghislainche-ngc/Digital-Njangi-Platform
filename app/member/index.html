<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>My Njangi — NjangiBridge</title>
    <link rel="stylesheet" href="/src/css/app.css" />
    <script type="module" src="/src/js/boot.js"></script>
  </head>
  <body x-data x-init="$store.theme.init()" x-cloak class="relative">
    <div id="app-shell"></div>
    <script type="module">
      import { renderShell, mountContent } from '/src/js/components/app-shell.js';
      renderShell({ role: 'member', title: 'My Njangi' });
      mountContent(`
        <div class="grid gap-4 md:grid-cols-3 animate-fade-up">
          <div class="glass-card p-5 md:col-span-2">
            <p class="text-xs uppercase tracking-widest muted">Next due</p>
            <p class="mt-2 font-display text-3xl font-bold">10 000 FCFA</p>
            <p class="mt-1 text-sm muted">April 26 · MTN MoMo auto-debit</p>
            <div class="mt-4 flex gap-2">
              <button class="btn-primary">Pay now</button>
              <button class="btn-ghost">Review details</button>
            </div>
          </div>
          <div class="glass-card p-5">
            <p class="text-xs uppercase tracking-widest muted">My payout turn</p>
            <p class="mt-2 font-display text-2xl font-bold">Position 7</p>
            <p class="mt-1 text-xs muted">Estimated: July 28</p>
          </div>
        </div>

        <div class="mt-6 grid gap-4 lg:grid-cols-2">
          <div class="glass-card p-5">
            <h2 class="font-display text-xl font-bold mb-3">Recent contributions</h2>
            <ul class="divide-y divide-[var(--border-subtle)]">
              <li class="flex items-center justify-between py-3"><div><p class="text-sm font-medium">March 2026</p><p class="text-xs muted">MTN MoMo · 10 000 FCFA</p></div><span class="chip chip-paid">Paid</span></li>
              <li class="flex items-center justify-between py-3"><div><p class="text-sm font-medium">February 2026</p><p class="text-xs muted">MTN MoMo · 10 000 FCFA</p></div><span class="chip chip-paid">Paid</span></li>
              <li class="flex items-center justify-between py-3"><div><p class="text-sm font-medium">January 2026</p><p class="text-xs muted">Cash · 10 000 FCFA</p></div><span class="chip chip-paid">Paid</span></li>
            </ul>
          </div>
          <div class="glass-card p-5">
            <h2 class="font-display text-xl font-bold mb-3">Group ledger</h2>
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div class="glass-card p-3"><p class="muted text-xs">Pot balance</p><p class="font-display text-lg font-bold">450 000</p></div>
              <div class="glass-card p-3"><p class="muted text-xs">Members paid</p><p class="font-display text-lg font-bold">11 / 14</p></div>
              <div class="glass-card p-3"><p class="muted text-xs">Social fund</p><p class="font-display text-lg font-bold">85 000</p></div>
              <div class="glass-card p-3"><p class="muted text-xs">Cycle</p><p class="font-display text-lg font-bold">4 of 14</p></div>
            </div>
            <a href="/app/member/rotation.html" class="mt-4 inline-block text-sm accent-text font-semibold">View full rotation →</a>
          </div>
        </div>
      `);
    </script>
  </body>
</html>
