<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Directory — NjangiBridge</title>
    <link rel="stylesheet" href="/src/css/app.css" />
    <script type="module" src="/src/js/boot.js"></script>
  </head>
  <body x-data x-init="$store.theme.init()" x-cloak class="relative">
    <div id="app-shell"></div>
    <script type="module">
      import { renderShell, mountContent } from '/src/js/components/app-shell.js';
      renderShell({ role: 'secretary', title: 'Member directory' });
      const cards = [
        { name: 'Marie Tchinda',      role: 'President',  phone: '+237 6XX XXX 001', email: 'marie@example.cm',   initials: 'MT' },
        { name: 'Jean-Pierre Mbarga', role: 'Treasurer',  phone: '+237 6XX XXX 002', email: 'jp@example.cm',      initials: 'JP' },
        { name: 'Claire Biya',        role: 'Secretary',  phone: '+237 6XX XXX 003', email: 'claire@example.cm',  initials: 'CB' },
        { name: 'Fatou Ngo',          role: 'Member',     phone: '+237 6XX XXX 004', email: 'fatou@example.cm',   initials: 'FN' },
        { name: 'Pa Ngwa',            role: 'Member',     phone: '+237 6XX XXX 005', email: 'pangwa@example.cm',  initials: 'PN' },
        { name: 'Alice Fotso',        role: 'Member',     phone: '+237 6XX XXX 006', email: 'alice@example.cm',   initials: 'AF' },
      ].map(m => `
        <div class="glass-card p-5">
          <div class="flex items-center gap-3">
            <div class="h-12 w-12 rounded-full accent-bg text-[var(--text-on-brand)] grid place-items-center font-bold">${m.initials}</div>
            <div class="flex-1 min-w-0">
              <p class="font-semibold truncate">${m.name}</p>
              <p class="text-xs muted">${m.role}</p>
            </div>
          </div>
          <div class="mt-4 space-y-1 text-sm">
            <p class="flex items-center gap-2"><span class="muted text-xs uppercase w-12">tel</span> <span class="font-mono text-xs">${m.phone}</span></p>
            <p class="flex items-center gap-2"><span class="muted text-xs uppercase w-12">mail</span> <span class="truncate text-xs">${m.email}</span></p>
          </div>
          <div class="mt-4 flex gap-2">
            <button class="btn-ghost flex-1 text-xs">Edit</button>
            <button class="btn-ghost flex-1 text-xs">Message</button>
          </div>
        </div>
      `).join('');
      mountContent(`
        <div class="glass-card p-5 mb-6 flex flex-wrap items-center gap-3">
          <input type="search" placeholder="Search members…" class="glass-input flex-1 min-w-[220px]" />
          <button class="btn-ghost">↓ Export CSV</button>
          <button class="btn-primary">+ Add member</button>
        </div>

        <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">${cards}</div>

        <p class="mt-6 text-xs muted">PR-10: Secretary maintains directory, updates contact details.</p>
      `);
    </script>
  </body>
</html>
