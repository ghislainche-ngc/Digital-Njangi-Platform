<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Analytics — NjangiBridge</title>
    <link rel="stylesheet" href="/src/css/app.css" />
    <script type="module" src="/src/js/boot.js"></script>
  </head>
  <body x-data x-init="$store.theme.init()" x-cloak class="relative">
    <div id="app-shell"></div>
    <script type="module">
      import { renderShell, mountContent } from '/src/js/components/app-shell.js';
      renderShell({ role: 'admin', title: 'Platform analytics' });
      const bars = [40, 55, 48, 62, 70, 68, 82, 75, 90].map(h => `
        <div class="flex-1 rounded-t-md" style="height: ${h}%; background: var(--text-primary); opacity: .85;"></div>
      `).join('');
      mountContent(`
        <div class="grid gap-4 md:grid-cols-4">
          <div class="glass-card p-5">
            <p class="text-xs muted uppercase tracking-wider">Active groups</p>
            <p class="mt-2 font-display text-3xl font-bold">47</p>
            <p class="mt-1 text-xs text-emerald-500">+5 this month</p>
          </div>
          <div class="glass-card p-5">
            <p class="text-xs muted uppercase tracking-wider">MoMo volume (30d)</p>
            <p class="mt-2 font-display text-3xl font-bold">24.8M</p>
            <p class="mt-1 text-xs muted">FCFA · +12%</p>
          </div>
          <div class="glass-card p-5">
            <p class="text-xs muted uppercase tracking-wider">Churn rate</p>
            <p class="mt-2 font-display text-3xl font-bold">2.1%</p>
            <p class="mt-1 text-xs text-emerald-500">−0.4 pp</p>
          </div>
          <div class="glass-card p-5">
            <p class="text-xs muted uppercase tracking-wider">Payout success</p>
            <p class="mt-2 font-display text-3xl font-bold">98.3%</p>
            <p class="mt-1 text-xs muted">last 7 days</p>
          </div>
        </div>

        <div class="mt-6 grid gap-4 lg:grid-cols-2">
          <div class="glass-card p-5">
            <h2 class="font-display text-xl font-bold mb-4">MoMo volume by week</h2>
            <div class="flex items-end gap-2 h-48">${bars}</div>
            <p class="mt-3 text-xs muted">Weeks 6 → 14, 2026 · FCFA millions.</p>
          </div>
          <div class="glass-card p-5">
            <h2 class="font-display text-xl font-bold mb-4">Plan distribution</h2>
            <ul class="space-y-3 text-sm">
              <li>
                <div class="flex items-center justify-between mb-1"><span>Starter</span><span class="muted">12</span></div>
                <div class="h-2 rounded-full bg-[var(--bg-muted)] overflow-hidden"><div class="h-full accent-bg" style="width: 25%"></div></div>
              </li>
              <li>
                <div class="flex items-center justify-between mb-1"><span>Growth</span><span class="muted">24</span></div>
                <div class="h-2 rounded-full bg-[var(--bg-muted)] overflow-hidden"><div class="h-full accent-bg" style="width: 51%"></div></div>
              </li>
              <li>
                <div class="flex items-center justify-between mb-1"><span>Pro</span><span class="muted">9</span></div>
                <div class="h-2 rounded-full bg-[var(--bg-muted)] overflow-hidden"><div class="h-full accent-bg" style="width: 19%"></div></div>
              </li>
              <li>
                <div class="flex items-center justify-between mb-1"><span>Enterprise</span><span class="muted">2</span></div>
                <div class="h-2 rounded-full bg-[var(--bg-muted)] overflow-hidden"><div class="h-full accent-bg" style="width: 5%"></div></div>
              </li>
            </ul>
          </div>
        </div>

        <p class="mt-4 text-xs muted">Per PR-42: active groups, MoMo volume, churn.</p>
      `);
    </script>
  </body>
</html>
