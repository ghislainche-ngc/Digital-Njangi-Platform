<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>President — NjangiBridge</title>
    <link rel="stylesheet" href="/src/css/app.css" />
    <script type="module" src="/src/js/boot.js"></script>
  </head>
  <body x-data x-init="$store.theme.init()" x-cloak class="relative">
    <div id="app-shell"></div>
    <script type="module">
      import { renderShell, mountContent } from '/src/js/components/app-shell.js';
      renderShell({ role: 'president', title: 'Group overview' });
      mountContent(`
        <div class="glass-card p-4 mb-4 flex flex-wrap items-center gap-3 animate-fade-up">
          <span class="chip chip-info">You</span>
          <p class="text-sm"><span class="muted">Your cycle 4 contribution:</span> <span class="font-semibold">Paid · MTN MoMo · Apr 14</span></p>
          <span class="text-sm muted hidden sm:inline">·</span>
          <p class="text-sm"><span class="muted">Your rotation position:</span> <span class="font-semibold">2 · Next up (Apr 28)</span></p>
          <a href="/app/member/history.html" class="ml-auto nav-link text-xs">My Njangi →</a>
        </div>

        <div class="grid gap-4 md:grid-cols-3 animate-fade-up">
          <div class="glass-card p-5">
            <p class="text-xs uppercase tracking-widest muted">Pot balance</p>
            <p class="mt-2 font-display text-3xl font-bold">450 000 FCFA</p>
            <div class="mt-3 h-2 rounded-full bg-[var(--bg-muted)] overflow-hidden">
              <div class="h-full accent-bg" style="width: 78%"></div>
            </div>
            <p class="mt-2 text-xs muted">78% of target collected</p>
          </div>
          <div class="glass-card p-5">
            <p class="text-xs uppercase tracking-widest muted">Next payout</p>
            <p class="mt-2 font-display text-2xl font-bold">Marie Tchinda</p>
            <p class="mt-1 text-xs muted">April 28 · Random draw</p>
            <button class="btn-primary mt-4 w-full">Approve payout</button>
          </div>
          <div class="glass-card p-5">
            <p class="text-xs uppercase tracking-widest muted">Members paid</p>
            <p class="mt-2 font-display text-3xl font-bold">11 / 14</p>
            <div class="mt-3 flex -space-x-2">
              <div class="h-8 w-8 rounded-full accent-bg text-white text-xs grid place-items-center border-2 border-[var(--bg-surface)]">MT</div>
              <div class="h-8 w-8 rounded-full bg-pink-500 text-white text-xs grid place-items-center border-2 border-[var(--bg-surface)]">FN</div>
              <div class="h-8 w-8 rounded-full bg-emerald-500 text-white text-xs grid place-items-center border-2 border-[var(--bg-surface)]">JP</div>
              <div class="h-8 w-8 rounded-full bg-[var(--bg-muted)] text-xs grid place-items-center border-2 border-[var(--bg-surface)]">+8</div>
            </div>
          </div>
        </div>

        <div class="mt-6 grid gap-4 lg:grid-cols-3">
          <div class="lg:col-span-2 glass-card p-5">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-display text-xl font-bold">Contribution ledger</h2>
              <span class="chip chip-info">Cycle 4</span>
            </div>
            <ul class="divide-y divide-[var(--border-subtle)]">
              <li class="flex items-center justify-between py-3">
                <div class="flex items-center gap-3">
                  <div class="h-9 w-9 rounded-full accent-bg/20 accent-text grid place-items-center font-semibold text-sm">JP</div>
                  <div><p class="text-sm font-medium">Jean-Pierre Mbarga</p><p class="text-xs muted">MTN MoMo · 10 000 FCFA</p></div>
                </div>
                <span class="chip chip-paid">Paid</span>
              </li>
              <li class="flex items-center justify-between py-3">
                <div class="flex items-center gap-3">
                  <div class="h-9 w-9 rounded-full bg-pink-500/20 text-pink-500 grid place-items-center font-semibold text-sm">FN</div>
                  <div><p class="text-sm font-medium">Fatou Ngo</p><p class="text-xs muted">Orange Money · 10 000 FCFA</p></div>
                </div>
                <span class="chip chip-paid">Paid</span>
              </li>
              <li class="flex items-center justify-between py-3">
                <div class="flex items-center gap-3">
                  <div class="h-9 w-9 rounded-full bg-amber-500/20 text-amber-500 grid place-items-center font-semibold text-sm">PN</div>
                  <div><p class="text-sm font-medium">Pa Ngwa</p><p class="text-xs muted">Cash · pending</p></div>
                </div>
                <span class="chip chip-due">Due</span>
              </li>
            </ul>
          </div>
          <div class="glass-card p-5">
            <h2 class="font-display text-xl font-bold mb-3">Rotation</h2>
            <ol class="space-y-3 text-sm">
              <li class="flex items-center justify-between"><span>1 · Claire B.</span><span class="chip chip-paid">Done</span></li>
              <li class="flex items-center justify-between"><span>2 · Marie T.</span><span class="chip chip-info">Next</span></li>
              <li class="flex items-center justify-between muted"><span>3 · Jean-Pierre M.</span><span>—</span></li>
              <li class="flex items-center justify-between muted"><span>4 · Fatou N.</span><span>—</span></li>
            </ol>
          </div>
        </div>
      `);
    </script>
  </body>
</html>
